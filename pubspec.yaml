name: darkkick
description: A self-destructing messenger

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  image_picker: ^1.0.4
  local_auth: ^3.0.1
  flutter_riverpod: ^2.5.2
  firebase_messaging: ^15.2.10
  in_app_purchase: ^3.1.7
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1
  logger: ^2.0.2+1
  encrypt: ^5.0.1
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  microphone: ^0.1.0
  audioplayers: ^6.7.0
  path_provider: ^2.1.1
  permission_handler: ^12.0.3
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  google_fonts: ^6.3.3
  lottie: ^3.0.0
  http: 1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/auth_bg.png
    - assets/images/auth_angel.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/auth_bg.png"
  adaptive_icon_foreground: "assets/images/auth_bg.png"
  adaptive_icon_background: "#07050C"
dependency_overrides:
  http: 1.2.2
